name: Copilot Review Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: copilot-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-copilot-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate Copilot review signals
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.setFailed('PR number not found');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const headSha = pr.head?.sha;
            const targetUrl = pr.html_url;
            const statusContext = 'copilot-review';

            const copilotLogins = new Set([
              'github-copilot[bot]',
              'copilot-pull-request-reviewer[bot]',
              'copilot-pull-request-reviewer',
              'copilot',
            ]);

            const criticalPatterns = [
              /\bcritical\b/i,
              /\bblocker\b/i,
              /\bsev(?:erity)?\s*[:=]?\s*(critical|high)\b/i,
              /\bhigh\s+severity\b/i,
              /\b(vulnerability|security issue|security risk)\b/i,
              /\b(ssrf|xss|sql injection|rce)\b/i,
              /重大(?:な)?(?:問題|不具合|バグ|脆弱性|セキュリティ)/i,
              /高(?:重大度|優先度)/i,
              /データ(?:損失|漏洩)/i,
              /クラッシュ/i,
            ];

            const nonCriticalHints = [
              /\bno\s+(critical|high severity|security issues?|bugs?)\b/i,
              /(?:問題|バグ|脆弱性)(?:は|が)?(?:ありません|なし)/i,
              /指摘なし/,
              /問題なし/,
            ];

            const isCopilotLogin = (login) => {
              if (!login) return false;
              return copilotLogins.has(String(login).trim().toLowerCase());
            };

            const hasCriticalSignal = (text) => {
              if (!text || typeof text !== 'string') return false;
              if (nonCriticalHints.some((pattern) => pattern.test(text))) return false;
              return criticalPatterns.some((pattern) => pattern.test(text));
            };

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const copilotTexts = [];

            for (const review of reviews) {
              if (!isCopilotLogin(review.user?.login)) continue;
              const body = review.body || '';
              if (body.trim().length === 0) continue;
              copilotTexts.push({
                source: 'review',
                id: review.id,
                body,
                submittedAt: review.submitted_at || review.updated_at || review.created_at || null,
              });
            }

            for (const comment of reviewComments) {
              if (!isCopilotLogin(comment.user?.login)) continue;
              const body = comment.body || '';
              if (body.trim().length === 0) continue;
              copilotTexts.push({
                source: 'review-comment',
                id: comment.id,
                body,
                submittedAt: comment.updated_at || comment.created_at || null,
              });
            }

            const criticalFindings = copilotTexts.filter((entry) => hasCriticalSignal(entry.body));

            const createStatus = async (state, description) => {
              if (!headSha) return;
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: headSha,
                state,
                context: statusContext,
                description: description.slice(0, 140),
                target_url: targetUrl,
              });
            };

            if (criticalFindings.length > 0) {
              const first = criticalFindings[0];
              const compact = String(first.body).replace(/\s+/g, ' ').trim();
              const snippet = compact.length > 110 ? `${compact.slice(0, 109)}…` : compact;
              await createStatus('failure', `Copilot critical signal detected (${first.source}#${first.id}): ${snippet}`);
              core.setFailed(`Copilot critical signal detected (${criticalFindings.length} findings)`);
              return;
            }

            await createStatus('success', 'No Copilot critical findings detected');
            core.info(`Evaluated ${copilotTexts.length} Copilot review entries; no critical findings.`);
