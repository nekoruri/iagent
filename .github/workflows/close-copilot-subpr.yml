name: Close Copilot Sub PR

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  close-sub-pr:
    if: ${{ github.event.pull_request.user.login == 'app/copilot-swe-agent' && startsWith(github.event.pull_request.head.ref, 'copilot/sub-pr-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Close auto-generated Copilot sub PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: [
                'This repository auto-closes `copilot/sub-pr-*` pull requests.',
                'Please use the original PR thread for review feedback instead of creating a sub PR.',
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              state: 'closed',
            });
